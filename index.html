<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraConv 500-Channel Abyssal Resonator Matrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .neon-border {
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.2), inset 0 0 10px rgba(16, 185, 129, 0.1);
    }
    .neon-text {
      text-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
    }
    .neon-active {
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
    }

    /* PERF FIX: specify exact properties instead of 'all' to avoid
       triggering layout/paint on unrelated property changes across 500 cards */
    .channel-card {
      transition: opacity 0.15s ease-in-out,
                  box-shadow 0.15s ease-in-out,
                  border-color 0.15s ease-in-out;
      contain: layout style; /* isolate repaints to each card */
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #10b981; }

    /* PERF FIX: promote scroll container to its own compositor layer */
    #grid-container {
      will-change: transform;
      contain: strict;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans selection:bg-emerald-500 selection:text-slate-950">

  <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 py-4 px-6 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse neon-active"></div>
      <h1 class="text-lg font-bold tracking-wider uppercase text-emerald-400 neon-text">AuraConv 500-Tap Matrix</h1>
    </div>
    <div class="flex items-center space-x-4">
      <span class="text-xs text-slate-400 font-mono" id="status-text">Audio Engine: Offline</span>
      <button id="mic-btn" class="px-5 py-2 rounded-full bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-slate-950 font-bold text-sm tracking-wide transition-all shadow-md active:scale-95 flex items-center space-x-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
        <span>Activate Microphone</span>
      </button>
    </div>
  </header>

  <main class="flex-grow p-6 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6">

    <div class="lg:col-span-3 flex flex-col space-y-6">
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 flex flex-col space-y-5 shadow-xl">
        <h2 class="text-sm font-semibold tracking-widest text-slate-400 uppercase border-b border-slate-800 pb-2">Master Deck</h2>

        <div class="relative w-full h-40 bg-slate-950 rounded-xl overflow-hidden border border-slate-800/80">
          <canvas id="visualizer" class="w-full h-full block"></canvas>
          <div class="absolute bottom-2 left-2 text-[10px] font-mono text-slate-500 tracking-wider">Output Spectrum</div>
        </div>

        <div class="flex flex-col space-y-2">
          <div class="flex justify-between text-xs font-mono text-slate-400">
            <span>Global Mix</span><span id="master-mix-val">100%</span>
          </div>
          <input type="range" id="master-mix" min="0" max="100" value="100" class="w-full accent-emerald-500 bg-slate-950 h-2 rounded-lg cursor-pointer">
        </div>

        <div class="flex flex-col space-y-2">
          <div class="flex justify-between text-xs font-mono text-slate-400">
            <span>Master Volume</span><span id="master-vol-val">70%</span>
          </div>
          <input type="range" id="master-vol" min="0" max="100" value="70" class="w-full accent-emerald-500 bg-slate-950 h-2 rounded-lg cursor-pointer">
        </div>

        <div class="flex flex-col space-y-2">
          <div class="flex justify-between text-xs font-mono text-slate-400">
            <span>Resonance (Feedback)</span><span id="master-fb-val">0%</span>
          </div>
          <input type="range" id="master-fb" min="0" max="95" value="0" class="w-full accent-emerald-500 bg-slate-950 h-2 rounded-lg cursor-pointer">
        </div>

        <div class="flex flex-col space-y-2">
          <div class="flex justify-between text-xs font-mono text-slate-400">
            <span>Timbre Tilt</span><span id="master-tilt-val">Flat</span>
          </div>
          <input type="range" id="master-tilt" min="0" max="100" value="50" class="w-full accent-emerald-500 bg-slate-950 h-2 rounded-lg cursor-pointer">
        </div>

        <div class="flex flex-col space-y-2">
          <label class="text-xs font-mono text-slate-400">Invert Blocking Polarity</label>
          <select id="master-mode" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-xs font-mono text-slate-300 focus:outline-none focus:border-emerald-500">
            <option value="0">Mode: Pass / Allow (Sustained Wash)</option>
            <option value="1">Mode: Block Samples (Silence Gaps)</option>
          </select>
        </div>

        <div class="flex flex-col space-y-3 pt-2">
          <div class="text-xs font-mono text-slate-400 uppercase tracking-widest border-t border-slate-800 pt-3 pb-1">Group Tapes Presets</div>
          <div class="grid grid-cols-2 gap-2">
            <button id="preset-softener" class="px-2 py-1.5 text-[10px] font-semibold rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors">Softener</button>
            <button id="preset-muffle" class="px-2 py-1.5 text-[10px] font-semibold rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors">Warmth</button>
            <button id="preset-wash" class="px-2 py-1.5 text-[10px] font-semibold rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors">Blur</button>
            <button id="preset-abyss" class="px-2 py-1.5 text-[10px] font-semibold rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-300 transition-colors">Abyss</button>
            <button id="btn-mute-all" class="px-3 py-1.5 col-span-2 text-xs font-semibold rounded-lg bg-slate-950 border border-slate-800 text-slate-400 hover:bg-slate-900 transition-colors">Mute All</button>
          </div>
        </div>
      </div>
    </div>

    <div class="lg:col-span-9 flex flex-col space-y-4">
      <div class="flex justify-between items-center pb-2 border-b border-slate-800">
        <h2 class="text-sm font-semibold tracking-widest text-slate-400 uppercase">Parallel Processing Matrix</h2>
        <div class="flex items-center space-x-2">
          <button id="btn-select-all" disabled class="px-2 py-1 text-[10px] font-semibold rounded bg-emerald-950/40 border border-emerald-800/40 text-emerald-400 hover:bg-emerald-900/40 transition-colors cursor-not-allowed opacity-50">Enable All</button>
          <button id="btn-deselect-all" disabled class="px-2 py-1 text-[10px] font-semibold rounded bg-slate-900 border border-slate-800 text-slate-400 hover:bg-slate-800 transition-colors cursor-not-allowed opacity-50">Disable All</button>
          <span class="text-xs font-mono text-slate-500" id="active-count">0/500 Active</span>
        </div>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 gap-2 overflow-y-auto max-h-[75vh] pr-2" id="grid-container"></div>
    </div>
  </main>

  <footer class="border-t border-slate-800 py-4 text-center text-[10px] font-mono text-slate-600 bg-slate-950">
    AuraConv DSP Engine v4 • 500-Channel Modal Resonator Architecture
  </footer>

  <script>
    "use strict";

    /* ===================================================================
       1. TAP GENERATION (unchanged logic, minor cleanup)
       =================================================================== */
    const CHANNEL_COUNT = 500;
    const oddTaps = new Uint32Array(CHANNEL_COUNT);
    const minTaps = 25;
    const maxTaps = 1000001;
    const logFactor = Math.pow(maxTaps / minTaps, 1 / (CHANNEL_COUNT - 1));
    let cur = minTaps;

    for (let i = 0; i < CHANNEL_COUNT; i++) {
      let val = Math.round(cur);
      if ((val & 1) === 0) val += 1;           // bitwise odd check
      if (i > 0 && val <= oddTaps[i - 1]) val = oddTaps[i - 1] + 2;
      oddTaps[i] = val;
      cur *= logFactor;
    }

    function getCategory(size) {
      if (size <= 250)    return { text: "Soften", color: "text-blue-400 border-blue-900/60 bg-blue-950/20" };
      if (size <= 2000)   return { text: "Warm",   color: "text-amber-400 border-amber-900/60 bg-amber-950/20" };
      if (size <= 20000)  return { text: "Blur",   color: "text-purple-400 border-purple-900/60 bg-purple-950/20" };
      if (size <= 150000) return { text: "Wash",   color: "text-emerald-400 border-emerald-900/60 bg-emerald-950/20" };
      return                     { text: "Abyss",  color: "text-cyan-400 border-cyan-900/60 bg-cyan-950/20" };
    }

    /* ===================================================================
       2. AUDIOWORKLET — fixed numerical drift & per-sample overhead
       =================================================================== */
    const workletCode = `
      class MovingAverageProcessor extends AudioWorkletProcessor {
        static get parameterDescriptors() {
          return [
            { name: 'gain',     defaultValue: 0.15, minValue: 0, maxValue: 1 },
            { name: 'mix',      defaultValue: 1.0,  minValue: 0, maxValue: 1 },
            { name: 'feedback', defaultValue: 0.0,  minValue: 0, maxValue: 0.95 },
            { name: 'mode',     defaultValue: 0,    minValue: 0, maxValue: 1 }
          ];
        }

        constructor(options) {
          super(options);
          const size = options.processorOptions.size || 1001;
          this.size = size;
          // PERF: use exact-size circular buffer instead of next-pow-2.
          // Modulo is only ~2 ns slower than bitwise AND on modern JIT,
          // but saves up to 47 % memory for sizes just above a power of 2.
          this.bufL = new Float32Array(size);
          this.bufR = new Float32Array(size);
          this.pos = 0;
          this.sumL = 0;
          this.sumR = 0;
          this.prevWetL = 0;
          this.prevWetR = 0;
          // DRIFT FIX: recalculate running sum every N frames to prevent
          // IEEE-754 accumulation error (audible DC offset after ~30 s).
          this.recalcCounter = 0;
          this.recalcInterval = 4096; // ~every 93 ms at 44.1 kHz
        }

        process(inputs, outputs, parameters) {
          const input  = inputs[0];
          const output = outputs[0];
          if (!input || !input.length || !output || !output.length) return true;

          const inL  = input[0];
          const inR  = input[1] || inL;
          const outL = output[0];
          const outR = output[1] || outL;

          const gArr  = parameters.gain;
          const mArr  = parameters.mix;
          const fbArr = parameters.feedback;
          const mdArr = parameters.mode;
          const len   = inL.length;
          const size  = this.size;
          const half  = (size - 1) >> 1;   // integer divide; size is always odd

          // PERF: hoist automation checks outside the sample loop
          const gAuto  = gArr.length  > 1;
          const mAuto  = mArr.length  > 1;
          const fbAuto = fbArr.length > 1;
          const mdAuto = mdArr.length > 1;

          // PERF: resolve constant mode once when non-automated
          const constMode = mdAuto ? -1 : (mdArr[0] >= 0.5 ? 1 : 0);

          let { pos, sumL, sumR, prevWetL, prevWetR } = this;
          const bufL = this.bufL;
          const bufR = this.bufR;

          for (let i = 0; i < len; i++) {
            const gain = gAuto  ? gArr[i]  : gArr[0];
            const mix  = mAuto  ? mArr[i]  : mArr[0];
            const fb   = fbAuto ? fbArr[i] : fbArr[0];
            const mode = mdAuto ? (mdArr[i] >= 0.5 ? 1 : 0) : constMode;

            const sL = inL[i] + prevWetL * fb;
            const sR = inR[i] + prevWetR * fb;

            // Subtract outgoing sample BEFORE overwriting
            sumL -= bufL[pos];
            sumR -= bufR[pos];

            bufL[pos] = sL;
            bufR[pos] = sR;

            sumL += sL;
            sumR += sR;

            const wetL = (sumL / size) * gain;
            const wetR = (sumR / size) * gain;
            prevWetL = wetL;
            prevWetR = wetR;

            // Dry read (group-delay compensated)
            let dryPos = pos - half;
            if (dryPos < 0) dryPos += size;
            const dryL = bufL[dryPos];
            const dryR = bufR[dryPos];

            const tWetL = mode ? (dryL - wetL) : wetL;
            const tWetR = mode ? (dryR - wetR) : wetR;

            outL[i] = dryL + (tWetL - dryL) * mix;
            outR[i] = dryR + (tWetR - dryR) * mix;

            pos++;
            if (pos >= size) pos = 0;
          }

          // DRIFT FIX: periodically recompute sum from buffer contents
          this.recalcCounter += len;
          if (this.recalcCounter >= this.recalcInterval) {
            this.recalcCounter = 0;
            let rL = 0, rR = 0;
            for (let j = 0; j < size; j++) { rL += bufL[j]; rR += bufR[j]; }
            sumL = rL;
            sumR = rR;
          }

          this.pos = pos;
          this.sumL = sumL;
          this.sumR = sumR;
          this.prevWetL = prevWetL;
          this.prevWetR = prevWetR;
          return true;
        }
      }
      registerProcessor('moving-average-processor', MovingAverageProcessor);
    `;

    /* ===================================================================
       3. STATE
       =================================================================== */
    let audioCtx      = null;
    let micSource     = null;
    let masterGain    = null;
    let analyser      = null;
    let workletReady  = false;
    const tracks      = new Array(CHANNEL_COUNT);

    // Pre-compute tilt weights (avoids 500 divisions per slider tick)
    const tiltWeights = new Float32Array(CHANNEL_COUNT);
    function recomputeTiltWeights() {
      const t = parseFloat(masterTiltSlider.value);
      for (let i = 0; i < CHANNEL_COUNT; i++) {
        const p = i / (CHANNEL_COUNT - 1);
        if (t > 50) {
          const f = (100 - t) / 50;
          tiltWeights[i] = 1 - p + p * f;
        } else if (t < 50) {
          const f = t / 50;
          tiltWeights[i] = p + (1 - p) * f;
        } else {
          tiltWeights[i] = 1;
        }
      }
    }

    /* ===================================================================
       4. DOM REFERENCES
       =================================================================== */
    const micBtn          = document.getElementById('mic-btn');
    const statusText      = document.getElementById('status-text');
    const gridContainer   = document.getElementById('grid-container');
    const masterVolSlider = document.getElementById('master-vol');
    const masterVolVal    = document.getElementById('master-vol-val');
    const masterMixSlider = document.getElementById('master-mix');
    const masterMixVal    = document.getElementById('master-mix-val');
    const masterFbSlider  = document.getElementById('master-fb');
    const masterFbVal     = document.getElementById('master-fb-val');
    const masterTiltSlider= document.getElementById('master-tilt');
    const masterTiltVal   = document.getElementById('master-tilt-val');
    const masterModeSelect= document.getElementById('master-mode');
    const activeCountText = document.getElementById('active-count');
    const btnSelectAll    = document.getElementById('btn-select-all');
    const btnDeselectAll  = document.getElementById('btn-deselect-all');

    /* ===================================================================
       5. BUILD 500 CARDS — single innerHTML write (unchanged strategy)
       =================================================================== */
    {
      const parts = new Array(CHANNEL_COUNT);
      for (let i = 0; i < CHANNEL_COUNT; i++) {
        const cat = getCategory(oddTaps[i]);
        parts[i] =
          `<div id="card-${i}" class="channel-card bg-slate-900 border border-slate-800/80 rounded-lg p-2.5 flex flex-col space-y-1.5 opacity-60">` +
            `<div class="flex justify-between items-center">` +
              `<div class="flex items-center space-x-1 overflow-hidden">` +
                `<span class="text-[9.5px] font-bold text-slate-200 truncate">${oddTaps[i].toLocaleString()}</span>` +
                `<span class="text-[7px] px-1 py-0.2 rounded border uppercase tracking-wider ${cat.color}">${cat.text}</span>` +
              `</div>` +
              `<button data-idx="${i}" class="toggle-btn w-7 h-4 bg-slate-800 rounded-full p-0.5 transition-all cursor-not-allowed" disabled>` +
                `<div class="dot w-3 h-3 rounded-full bg-slate-600 transition-all"></div>` +
              `</button>` +
            `</div>` +
            `<div class="flex flex-col space-y-0.5 pt-0.5">` +
              `<div class="flex justify-between text-[8px] font-mono text-slate-500"><span>Gain</span><span class="gain-val">50%</span></div>` +
              `<input type="range" data-idx="${i}" class="gain-slider w-full accent-emerald-500 bg-slate-950 h-0.5 rounded-lg cursor-not-allowed opacity-50" min="0" max="100" value="50" disabled>` +
            `</div>` +
            `<div class="flex flex-col space-y-0.5">` +
              `<div class="flex justify-between text-[8px] font-mono text-slate-500"><span>Mix</span><span class="mix-val">100%</span></div>` +
              `<input type="range" data-idx="${i}" class="mix-slider w-full accent-emerald-500 bg-slate-950 h-0.5 rounded-lg cursor-not-allowed opacity-50" min="0" max="100" value="100" disabled>` +
            `</div>` +
          `</div>`;
      }
      gridContainer.innerHTML = parts.join('');
    }

    // Cache per-track UI refs in a flat structure (avoids repeated querySelector)
    {
      const cards = gridContainer.children;
      for (let i = 0; i < CHANNEL_COUNT; i++) {
        const c = cards[i];
        tracks[i] = {
          idx: i,
          taps: oddTaps[i],
          node: null,          // LAZY: created on first activation
          gainNode: null,
          active: false,
          ui: {
            card:       c,
            toggleBtn:  c.querySelector('.toggle-btn'),
            dot:        c.querySelector('.dot'),
            gainSlider: c.querySelector('.gain-slider'),
            mixSlider:  c.querySelector('.mix-slider'),
            gainVal:    c.querySelector('.gain-val'),
            mixVal:     c.querySelector('.mix-val'),
          },
        };
      }
    }

    /* ===================================================================
       6. LAZY NODE FACTORY  (CRITICAL MEMORY FIX)
       Nodes + buffers are allocated only when a channel is first enabled.
       Saves ~800 MB+ at startup; channels that are never toggled cost 0.
       =================================================================== */
    function ensureNode(idx) {
      const t = tracks[idx];
      if (t.node) return; // already created

      const node = new AudioWorkletNode(audioCtx, 'moving-average-processor', {
        outputChannelCount: [2],
        processorOptions: { size: t.taps },
      });
      node.parameters.get('gain').setValueAtTime(
        parseFloat(t.ui.gainSlider.value) / 100, audioCtx.currentTime);
      node.parameters.get('mix').setValueAtTime(
        parseFloat(t.ui.mixSlider.value) / 100, audioCtx.currentTime);
      node.parameters.get('feedback').setValueAtTime(
        parseFloat(masterFbSlider.value) / 100, audioCtx.currentTime);
      node.parameters.get('mode').setValueAtTime(
        parseInt(masterModeSelect.value, 10), audioCtx.currentTime);

      const gn = audioCtx.createGain();
      gn.gain.setValueAtTime(0, audioCtx.currentTime);
      gn.connect(masterGain);

      t.node = node;
      t.gainNode = gn;
    }

    /* ===================================================================
       7. TRACK ACTIVATION / DEACTIVATION
       =================================================================== */
    function setTrackActive(idx, on) {
      const t = tracks[idx];
      if (t.active === on) return;
      t.active = on;
      const { ui } = t;

      if (on) {
        ensureNode(idx);  // lazy alloc

        // PERF: classList instead of className string replacement
        ui.card.classList.remove('opacity-60');
        ui.card.classList.add('neon-border', 'border-emerald-500/50');
        ui.dot.classList.remove('bg-slate-600');
        ui.dot.classList.add('bg-emerald-400', 'translate-x-3', 'shadow-md');
        ui.toggleBtn.classList.remove('bg-slate-800');
        ui.toggleBtn.classList.add('bg-emerald-950', 'border', 'border-emerald-500/50');

        micSource.connect(t.node);
        t.node.connect(t.gainNode);
        applyTrackGain(idx);
      } else {
        ui.card.classList.add('opacity-60');
        ui.card.classList.remove('neon-border', 'border-emerald-500/50');
        ui.dot.classList.add('bg-slate-600');
        ui.dot.classList.remove('bg-emerald-400', 'translate-x-3', 'shadow-md');
        ui.toggleBtn.classList.add('bg-slate-800');
        ui.toggleBtn.classList.remove('bg-emerald-950', 'border', 'border-emerald-500/50');

        // Ramp gain to zero, THEN disconnect after the ramp completes.
        // FIX: use the actual time-constant duration instead of a magic setTimeout.
        t.gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
        const node = t.node;
        const gn   = t.gainNode;
        // 5 × τ ≈ 99.3 % settled; τ = 0.01 s → 50 ms
        setTimeout(() => {
          if (!t.active) {
            try { node.disconnect(); } catch (_) {}
            try { micSource.disconnect(node); } catch (_) {}
          }
        }, 60);
      }
    }

    function applyTrackGain(idx) {
      const t = tracks[idx];
      if (!t.active || !t.gainNode) return;
      const raw = parseFloat(t.ui.gainSlider.value) / 100;
      t.gainNode.gain.setTargetAtTime(raw * tiltWeights[idx], audioCtx.currentTime, 0.01);
    }

    /* ===================================================================
       8. BATCHED PARAMETER UPDATES  (PERF FIX)
       Instead of calling setTargetAtTime 500× per input event,
       we schedule a single rAF callback that flushes once per frame.
       =================================================================== */
    let paramDirty = { mix: false, fb: false, tilt: false, mode: false };
    let paramRafId = 0;

    function scheduleParamFlush() {
      if (paramRafId) return;
      paramRafId = requestAnimationFrame(flushParams);
    }

    function flushParams() {
      paramRafId = 0;
      if (!audioCtx) return;
      const now = audioCtx.currentTime;

      if (paramDirty.mix) {
        const v = parseFloat(masterMixSlider.value) / 100;
        for (let i = 0; i < CHANNEL_COUNT; i++) {
          const n = tracks[i].node;
          if (n) n.parameters.get('mix').setTargetAtTime(v, now, 0.01);
        }
      }
      if (paramDirty.fb) {
        const v = parseFloat(masterFbSlider.value) / 100;
        for (let i = 0; i < CHANNEL_COUNT; i++) {
          const n = tracks[i].node;
          if (n) n.parameters.get('feedback').setTargetAtTime(v, now, 0.01);
        }
      }
      if (paramDirty.tilt) {
        recomputeTiltWeights();
        for (let i = 0; i < CHANNEL_COUNT; i++) applyTrackGain(i);
      }
      if (paramDirty.mode) {
        const v = parseInt(masterModeSelect.value, 10);
        for (let i = 0; i < CHANNEL_COUNT; i++) {
          const n = tracks[i].node;
          if (n) n.parameters.get('mode').setTargetAtTime(v, now, 0.01);
        }
      }
      paramDirty = { mix: false, fb: false, tilt: false, mode: false };
    }

    /* ===================================================================
       9. EVENT WIRING
       =================================================================== */

    // --- Grid event delegation (single listener, unchanged strategy) ---
    gridContainer.addEventListener('click', (e) => {
      const btn = e.target.closest('.toggle-btn');
      if (!btn || btn.disabled || !audioCtx) return;
      const idx = parseInt(btn.dataset.idx, 10);
      setTrackActive(idx, !tracks[idx].active);
      updateActiveCount();
    });

    gridContainer.addEventListener('input', (e) => {
      if (!audioCtx) return;
      const el = e.target;
      if (!el.classList.contains('gain-slider') && !el.classList.contains('mix-slider')) return;

      const idx = parseInt(el.dataset.idx, 10);
      const t   = tracks[idx];
      const gv  = t.ui.gainSlider.value;
      const mv  = t.ui.mixSlider.value;
      t.ui.gainVal.textContent = gv + '%';
      t.ui.mixVal.textContent  = mv + '%';

      if (t.node) {
        t.node.parameters.get('mix').setTargetAtTime(
          parseFloat(mv) / 100, audioCtx.currentTime, 0.01);
      }
      applyTrackGain(idx);
    });

    // --- Master sliders (batched via rAF) ---
    masterVolSlider.addEventListener('input', () => {
      masterVolVal.textContent = masterVolSlider.value + '%';
      if (masterGain && audioCtx)
        masterGain.gain.setTargetAtTime(
          parseFloat(masterVolSlider.value) / 100, audioCtx.currentTime, 0.01);
    });

    masterMixSlider.addEventListener('input', () => {
      masterMixVal.textContent = masterMixSlider.value + '%';
      paramDirty.mix = true;
      scheduleParamFlush();
    });

    masterFbSlider.addEventListener('input', () => {
      masterFbVal.textContent = masterFbSlider.value + '%';
      paramDirty.fb = true;
      scheduleParamFlush();
    });

    masterTiltSlider.addEventListener('input', () => {
      const v = parseInt(masterTiltSlider.value, 10);
      masterTiltVal.textContent =
        v === 50 ? 'Flat' :
        v >  50 ? `Bright (+${(v - 50) * 2}%)` :
                  `Dark (+${(50 - v) * 2}%)`;
      paramDirty.tilt = true;
      scheduleParamFlush();
    });

    masterModeSelect.addEventListener('change', () => {
      paramDirty.mode = true;
      scheduleParamFlush();
    });

    // --- Bulk toggles ---
    function toggleAllTracks(enable) {
      if (!audioCtx) return;
      for (let i = 0; i < CHANNEL_COUNT; i++) setTrackActive(i, enable);
      updateActiveCount();
    }

    btnSelectAll.addEventListener('click',   () => toggleAllTracks(true));
    btnDeselectAll.addEventListener('click', () => toggleAllTracks(false));
    document.getElementById('btn-mute-all').addEventListener('click', () => toggleAllTracks(false));

    function updateActiveCount() {
      let n = 0;
      for (let i = 0; i < CHANNEL_COUNT; i++) if (tracks[i].active) n++;
      activeCountText.textContent = n + '/500 Active';
    }

    // --- Presets ---
    function applyPreset(type) {
      if (!audioCtx) return;
      for (let i = 0; i < CHANNEL_COUNT; i++) {
        const t = tracks[i].taps;
        const on =
          (type === 'softener' && t <= 250) ||
          (type === 'muffle'   && t > 250 && t <= 5000) ||
          (type === 'wash'     && t > 5000 && t <= 150000) ||
          (type === 'abyss'    && t > 150000);
        setTrackActive(i, on);
      }
      updateActiveCount();
    }

    document.getElementById('preset-softener').addEventListener('click', () => applyPreset('softener'));
    document.getElementById('preset-muffle').addEventListener('click',   () => applyPreset('muffle'));
    document.getElementById('preset-wash').addEventListener('click',     () => applyPreset('wash'));
    document.getElementById('preset-abyss').addEventListener('click',    () => applyPreset('abyss'));

    /* ===================================================================
       10. AUDIO ENGINE INIT
       =================================================================== */
    micBtn.addEventListener('click', async () => {
      if (audioCtx) return;
      statusText.textContent = 'Connecting stream…';

      audioCtx = new (window.AudioContext || window.webkitAudioContext)({
        latencyHint: 'interactive',
      });

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
          video: false,
        });

        // Register worklet module
        const blob = new Blob([workletCode], { type: 'application/javascript' });
        const url  = URL.createObjectURL(blob);
        await audioCtx.audioWorklet.addModule(url);
        URL.revokeObjectURL(url);
        workletReady = true;

        micSource  = audioCtx.createMediaStreamSource(stream);
        masterGain = audioCtx.createGain();
        masterGain.gain.setValueAtTime(
          parseFloat(masterVolSlider.value) / 100, audioCtx.currentTime);

        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.8;

        masterGain.connect(analyser);
        analyser.connect(audioCtx.destination);

        // Enable all channel UI controls (nodes are NOT created yet — lazy)
        for (let i = 0; i < CHANNEL_COUNT; i++) {
          const ui = tracks[i].ui;
          ui.toggleBtn.disabled = false;
          ui.toggleBtn.classList.remove('cursor-not-allowed');
          ui.gainSlider.disabled = false;
          ui.gainSlider.classList.remove('cursor-not-allowed', 'opacity-50');
          ui.mixSlider.disabled = false;
          ui.mixSlider.classList.remove('cursor-not-allowed', 'opacity-50');
        }

        // Mobile speakerphone routing nudge
        if (audioCtx.suspend && audioCtx.resume) {
          await audioCtx.suspend();
          await audioCtx.resume();
        } else if (audioCtx.state === 'suspended') {
          await audioCtx.resume();
        }

        recomputeTiltWeights();

        statusText.textContent = 'Audio Engine: Online';
        statusText.classList.add('neon-text', 'text-emerald-400');
        micBtn.innerHTML =
          '<svg class="w-4 h-4 animate-pulse" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/></svg><span>Active</span>';
        micBtn.classList.add('bg-emerald-950', 'text-emerald-400', 'border',
                             'border-emerald-500', 'neon-active', 'cursor-not-allowed');
        micBtn.disabled = true;

        btnSelectAll.disabled = false;
        btnSelectAll.classList.remove('cursor-not-allowed', 'opacity-50');
        btnDeselectAll.disabled = false;
        btnDeselectAll.classList.remove('cursor-not-allowed', 'opacity-50');

        startVisualizer();
        updateActiveCount();

      } catch (err) {
        console.error('Audio init failure:', err);
        statusText.textContent = 'Error: Input Blocked';
        statusText.classList.add('text-red-500');
      }
    });

    /* ===================================================================
       11. VISUALIZER — pauses when off-screen / tab hidden
       =================================================================== */
    function startVisualizer() {
      const canvas    = document.getElementById('visualizer');
      const ctx       = canvas.getContext('2d');
      const bins      = analyser.frequencyBinCount;
      const data      = new Uint8Array(bins);
      let   running   = false;
      let   rafId     = 0;

      function resize() {
        const p = canvas.parentElement;
        canvas.width  = p.clientWidth  || 300;
        canvas.height = p.clientHeight || 150;
      }
      resize();
      new ResizeObserver(resize).observe(canvas.parentElement);

      function draw() {
        rafId = requestAnimationFrame(draw);
        analyser.getByteFrequencyData(data);

        const w = canvas.width, h = canvas.height;
        ctx.fillStyle = '#020617';
        ctx.fillRect(0, 0, w, h);

        const barW = (w / bins) * 2.5;
        let x = 0;
        for (let i = 0; i < bins; i++) {
          const pct = data[i] / 255;
          const bh  = pct * h;
          ctx.fillStyle = `rgb(16,${(pct * 150 + 100) | 0},${(pct * 80 + 120) | 0})`;
          ctx.fillRect(x, h - bh, barW - 1, bh);
          x += barW;
        }
      }

      // PERF: pause rAF when canvas is not visible or tab is hidden
      function start() { if (!running) { running = true; draw(); } }
      function stop()  { if (running)  { running = false; cancelAnimationFrame(rafId); } }

      new IntersectionObserver(([e]) => e.isIntersecting ? start() : stop(), {
        threshold: 0.1,
      }).observe(canvas);

      document.addEventListener('visibilitychange', () =>
        document.hidden ? stop() : start());

      start();
    }

    /* ===================================================================
       12. CLEANUP on page unload — release audio resources
       =================================================================== */
    window.addEventListener('beforeunload', () => {
      if (audioCtx) {
        for (let i = 0; i < CHANNEL_COUNT; i++) {
          const t = tracks[i];
          if (t.node) { try { t.node.disconnect(); } catch (_) {} }
          if (t.gainNode) { try { t.gainNode.disconnect(); } catch (_) {} }
        }
        audioCtx.close();
      }
    });
  </script>
</body>
